    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>VERITAS — The Autonomous AI Examination System</title>

    <!-- Performance: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">

    <!-- Fonts: Manrope -->

  <body class="font-display bg-background-dark text-text-cream antialiased">
    <div id="root"></div>
    <script>
      (function() {
        var urlParams = new URLSearchParams(window.location.search);
        var code = urlParams.get('code');
        if (!code) return;

        // IMPORTANT: Supabase OAuth (Google/GitHub sign-in) also returns with
        // ?code=... and relies on its client's detectSessionInUrl to consume
        // it. If we strip the code here, Supabase never gets the session and
        // the user bounces back to the landing page.
        //
        // The legacy "Connect GitHub afterwards" flow (GitHubRepoPicker) signals
        // itself before redirecting: popup via window.name='github-oauth',
        // main-tab redirect via localStorage 'VERITAS_github_oauth_return'. If
        // neither signal is present, this is a Supabase auth callback — bail
        // out and let the React app / Supabase client handle the URL.
        var isPopup = window.name === 'github-oauth' || (window.opener && window.opener !== window);
        var isLegacyRedirect = localStorage.getItem('VERITAS_github_oauth_return') === 'true';
        if (!isPopup && !isLegacyRedirect) return;

        // Store code — primary channel for the app to pick up
        localStorage.setItem('VERITAS_github_oauth_code', code);

        // ── POPUP PATH: window was opened by window.open() ───────────────────
        // Detect popup via window.name — set to 'github-oauth' by our window.open()
        // call and survives page navigations. window.opener is NOT reliable here
        // because GitHub sets COOP: same-origin on their pages, severing it before
        // the redirect back to our app.
        if (isPopup) {
          try {
            if (window.opener && window.opener !== window) {
              window.opener.postMessage(
                { type: 'github-oauth-callback', code: code },
                window.location.origin
              );
            }
          } catch(e) {}
          document.title = 'GitHub Connected';
          // The popup can always close itself — no dependency on window.opener
          window.close();
          // If close() somehow fails, show a manual-close message instead of
          // loading the full React app inside the popup
          setTimeout(function() {
            document.body.innerHTML = [
              '<div style="display:flex;align-items:center;justify-content:center;',
              'height:100vh;background:#0d1117;color:#e6edf3;font-family:sans-serif;text-align:center">',
              '<div><div style="font-size:36px;margin-bottom:12px">&#10003;</div>',
              '<p style="font-size:17px;font-weight:600;margin:0">GitHub connected!</p>',
              '<p style="opacity:0.55;margin-top:8px;font-size:13px">You can close this tab.</p></div></div>'
            ].join('');
          }, 400);
          return;
        }

        // ── REDIRECT PATH: popup was blocked, main tab did the OAuth flow ────
        // DON'T replace the body — let the React app load normally.
        // Clean the ?code= from the URL so it doesn't confuse the router.
        // Set a flag so App.jsx knows to restore the GitHub picker phase.
        localStorage.setItem('VERITAS_github_oauth_return', 'true');
        try {
          window.history.replaceState({}, document.title, window.location.pathname);
        } catch(e) {}
        // Fall through — main.jsx loads, React picks up the code from localStorage
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

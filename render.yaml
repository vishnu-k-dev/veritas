# Render Blueprint — VERITAS Backend
# Deploy: connect this repo on render.com → New Web Service → select backend/ as root
services:
  - type: web
    name: veritas-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Groq API — 4 dedicated keys (set these in Render dashboard)
      - key: GROQ_KEY_ANALYSIS
        sync: false
      - key: GROQ_KEY_QUESTIONS
        sync: false
      - key: GROQ_KEY_EVALUATOR
        sync: false
      - key: GROQ_KEY_SCORING
        sync: false
      # RAG pipeline — Neon Postgres + Cohere embeddings (optional, set in Render dashboard)
      - key: DATABASE_URL
        sync: false
      - key: COHERE_API_KEY
        sync: false
      # App config — update FRONTEND_URL to your Vercel URL after deploying frontend
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: https://veritas-virid.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://veritas-virid.vercel.app

